<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>16 Letters for Rose 💜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --lavender:       #C9B8E8;
      --lavender-light: #E8DFFC;
      --lavender-dark:  #9B87C2;
      --rose-gold:      #C89A82;
      --rose-gold-light:#E8C4B2;
      --rose-gold-dark: #A8745A;
      --pink-soft:      #F2CEDE;
      --pink-light:     #FCF0F5;
      --white-soft:     #FDFBFE;
      --text-dark:      #3D2B4A;
      --text-mid:       #6B4F7A;
      --text-light:     #9B87A8;
      --shadow:         rgba(156, 108, 160, 0.18);
      --shadow-lg:      rgba(156, 108, 160, 0.30);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--white-soft);
      color: var(--text-dark);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* CANVAS */
    #petal-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* MUSIC BUTTON */
    #music-btn {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border: 1.5px solid var(--lavender);
      border-radius: 50px; padding: 8px 18px; cursor: pointer;
      font-family: 'Lato', sans-serif; font-size: 13px;
      color: var(--text-mid); letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 7px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 14px var(--shadow);
    }
    #music-btn:hover {
      background: var(--lavender-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px var(--shadow);
    }
    #music-btn .note { font-size: 16px; }

    /* LANDING */
    #landing {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
      background: linear-gradient(145deg,#F9F4FE 0%,#F5ECF9 25%,#FDF0F5 55%,#F9EFF7 80%,#F4F0FC 100%);
      overflow: hidden; z-index: 1;
    }
    #landing::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: min(700px,110vw); height: min(700px,110vw);
      background: radial-gradient(circle,rgba(201,184,232,0.28) 0%,transparent 70%);
      pointer-events: none;
    }
    .landing-inner {
      position: relative; z-index: 2;
      animation: fadeInUp 1.2s ease forwards; opacity: 0;
    }
    .landing-eyebrow {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(15px,2.5vw,19px); color: var(--rose-gold);
      letter-spacing: 0.25em; margin-bottom: 18px;
    }
    .landing-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px,8vw,90px); font-weight: 700;
      line-height: 1.1; color: var(--text-dark); margin-bottom: 10px;
      text-shadow: 0 2px 30px rgba(180,140,200,0.25);
    }
    .landing-title span { color: var(--lavender-dark); }
    .landing-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(17px,2.8vw,22px); font-weight: 300;
      color: var(--text-mid); max-width: 480px; margin: 18px auto 44px;
      line-height: 1.7; letter-spacing: 0.02em;
    }
    .open-btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--lavender-dark), var(--rose-gold));
      color: #fff; font-family: 'Lato', sans-serif; font-size: 14px;
      font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 16px 46px; border: none; border-radius: 60px; cursor: pointer;
      text-decoration: none; transition: all 0.35s ease;
      box-shadow: 0 8px 28px rgba(155,135,194,0.4);
      position: relative; overflow: hidden;
    }
    .open-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
      border-radius: 60px;
    }
    .open-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 36px rgba(155,135,194,0.5); }
    .landing-deco {
      position: absolute; font-size: clamp(60px,12vw,120px);
      opacity: 0.07; pointer-events: none; user-select: none; color: var(--lavender-dark);
    }
    .landing-deco.top-left  { top: 5%; left: 3%; }
    .landing-deco.bot-right { bottom: 5%; right: 3%; transform: rotate(15deg); }

    /* PROGRESS */
    #progress-section {
      position: relative; z-index: 1; background: var(--white-soft);
      padding: 40px 24px 10px; text-align: center;
    }
    .progress-label {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 16px; color: var(--text-light); margin-bottom: 12px; letter-spacing: 0.08em;
    }
    .progress-label span { color: var(--lavender-dark); font-weight: 500; }
    .progress-bar-wrap {
      max-width: 320px; margin: 0 auto 4px; height: 6px;
      background: var(--lavender-light); border-radius: 10px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--lavender-dark), var(--rose-gold));
      border-radius: 10px; transition: width 0.5s ease;
    }

    /* LETTERS GRID */
    #letters {
      position: relative; z-index: 1;
      padding: 50px 24px 80px; max-width: 1100px; margin: 0 auto;
    }
    .section-heading {
      text-align: center; font-family: 'Playfair Display', serif;
      font-size: clamp(26px,4vw,38px); color: var(--text-dark);
      margin-bottom: 10px; font-style: italic;
    }
    .section-divider {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 48px;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; max-width: 120px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender));
    }
    .section-divider span { color: var(--rose-gold); font-size: 20px; }
    .letters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 220px), 1fr));
      gap: 28px; justify-items: center;
    }

    /* ENVELOPE CARD */
    .envelope-card {
      width: 100%; max-width: 240px; cursor: pointer;
      animation: fadeInUp 0.7s ease forwards; opacity: 0;
    }
    .envelope-wrap {
      position: relative; width: 100%; padding-top: 70%;
      border-radius: 14px;
      background: linear-gradient(145deg, var(--pink-light), #fff);
      border: 1.5px solid var(--rose-gold-light);
      box-shadow: 0 4px 22px var(--shadow), 0 1px 4px rgba(255,255,255,0.8) inset;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), box-shadow 0.35s ease;
    }
    .envelope-card:hover .envelope-wrap {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 12px 34px var(--shadow-lg);
    }
    .envelope-wrap::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 52%;
      background: linear-gradient(160deg, var(--lavender-light), var(--pink-soft));
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      z-index: 1; transition: opacity 0.3s;
    }
    .envelope-card.opened .envelope-wrap::before { opacity: 0.5; }
    .envelope-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 16px; z-index: 2;
    }
    .env-seal {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--lavender), var(--rose-gold-light));
      border: 2px solid rgba(255,255,255,0.7);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; box-shadow: 0 2px 10px var(--shadow);
      margin-bottom: 8px; transition: transform 0.3s;
    }
    .envelope-card:hover .env-seal { transform: scale(1.1) rotate(8deg); }
    .envelope-card.opened .env-seal { background: linear-gradient(135deg, var(--rose-gold-light), #E8D4C8); }
    .env-number {
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 0.18em; color: var(--text-light); text-transform: uppercase;
    }
    /* Voice badge on envelope 7 */
    .env-voice-badge {
      position: absolute; top: 10px; left: 10px; z-index: 3;
      background: linear-gradient(135deg, var(--lavender-dark), var(--rose-gold));
      border-radius: 20px; padding: 3px 8px;
      font-size: 10px; color: #fff; letter-spacing: 0.08em;
      font-family: 'Lato', sans-serif;
    }
    .env-opened-badge {
      position: absolute; top: 10px; right: 10px; z-index: 3;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--rose-gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff;
      opacity: 0; transform: scale(0); transition: all 0.3s ease;
    }
    .envelope-card.opened .env-opened-badge { opacity: 1; transform: scale(1); }

    /* MODAL */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(61,43,74,0.55); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #modal-overlay.active { opacity: 1; pointer-events: all; }
    #modal-box {
      background: var(--white-soft); border-radius: 22px;
      max-width: 580px; width: 100%; max-height: 88vh;
      overflow-y: auto; padding: 48px 44px; position: relative;
      box-shadow: 0 30px 80px rgba(100,60,130,0.28);
      transform: scale(0.88) translateY(30px);
      transition: transform 0.4s cubic-bezier(.34,1.4,.64,1);
      scrollbar-width: thin; scrollbar-color: var(--lavender) transparent;
    }
    #modal-overlay.active #modal-box { transform: scale(1) translateY(0); }
    #modal-box::before, #modal-box::after {
      content: '✦'; position: absolute; font-size: 22px; color: var(--rose-gold-light);
    }
    #modal-box::before { top: 16px; left: 20px; }
    #modal-box::after  { bottom: 16px; right: 20px; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--lavender-light); border: none; border-radius: 50%;
      width: 34px; height: 34px; cursor: pointer; font-size: 18px;
      color: var(--text-mid); display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
    }
    .modal-close:hover { background: var(--lavender); color: var(--text-dark); }
    .modal-letter-num {
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      letter-spacing: 0.22em; color: var(--rose-gold);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .modal-sender {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px,4vw,30px); font-style: italic;
      color: var(--text-dark); margin-bottom: 22px;
    }
    .modal-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--lavender), var(--rose-gold-light), transparent);
      margin-bottom: 26px;
    }
    .modal-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(17px,2.5vw,20px); font-weight: 300;
      line-height: 1.85; color: var(--text-mid); white-space: pre-line;
    }
    .modal-footer-deco {
      text-align: center; margin-top: 32px;
      font-size: 20px; opacity: 0.5; letter-spacing: 8px;
    }

    /* VOICE MESSAGE PLAYER */
    #modal-audio-wrap {
      display: none;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 10px 0 6px;
    }
    .voice-msg-card {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      background: linear-gradient(145deg, var(--lavender-light), var(--pink-light));
      border: 1.5px solid var(--lavender);
      border-radius: 20px; padding: 36px 32px 28px;
      width: 100%; text-align: center;
      box-shadow: 0 4px 24px var(--shadow);
    }
    .voice-icon { font-size: 48px; animation: pulse-icon 2.5s ease-in-out infinite; }
    @keyframes pulse-icon {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }
    .voice-label {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(17px,2.5vw,21px); color: var(--text-dark);
    }
    .voice-hint {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; color: var(--text-light); letter-spacing: 0.05em;
    }
    #modal-audio-player {
      width: 100%; max-width: 340px; border-radius: 50px;
      outline: none; accent-color: var(--lavender-dark);
      filter: drop-shadow(0 2px 8px var(--shadow));
    }
    #modal-audio-player::-webkit-media-controls-panel {
      background: linear-gradient(135deg, var(--lavender-light), var(--pink-light));
      border-radius: 50px;
    }

    /* FOOTER */
    footer {
      position: relative; z-index: 1; text-align: center;
      padding: 30px 20px 40px;
      background: linear-gradient(180deg, transparent, rgba(201,184,232,0.1));
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 16px; color: var(--text-light); letter-spacing: 0.06em;
    }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Staggered card entrance */
    .envelope-card:nth-child(1)  { animation-delay: 0.05s; }
    .envelope-card:nth-child(2)  { animation-delay: 0.10s; }
    .envelope-card:nth-child(3)  { animation-delay: 0.15s; }
    .envelope-card:nth-child(4)  { animation-delay: 0.20s; }
    .envelope-card:nth-child(5)  { animation-delay: 0.25s; }
    .envelope-card:nth-child(6)  { animation-delay: 0.30s; }
    .envelope-card:nth-child(7)  { animation-delay: 0.35s; }
    .envelope-card:nth-child(8)  { animation-delay: 0.40s; }
    .envelope-card:nth-child(9)  { animation-delay: 0.45s; }
    .envelope-card:nth-child(10) { animation-delay: 0.50s; }
    .envelope-card:nth-child(11) { animation-delay: 0.55s; }
    .envelope-card:nth-child(12) { animation-delay: 0.60s; }
    .envelope-card:nth-child(13) { animation-delay: 0.65s; }
    .envelope-card:nth-child(14) { animation-delay: 0.70s; }
    .envelope-card:nth-child(15) { animation-delay: 0.75s; }
    .envelope-card:nth-child(16) { animation-delay: 0.80s; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--lavender); border-radius: 10px; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      #modal-box { padding: 36px 24px; }
      .letters-grid { gap: 18px; }
    }
  </style>
</head>

    const sealEmojis = ['🌸','💜','✨','🌷','💫','🌺','🎙️','🌸','✿','💜','🌷','✨','💗','🌸','💫','🌺'];

    /* ============================================================
       BUILD GRID
    ============================================================ */
    const grid      = document.getElementById('letters-grid');
    const openedSet = new Set(JSON.parse(localStorage.getItem('rose_opened') || '[]'));

    letters.forEach((letter, i) => {
      const card = document.createElement('div');
      card.className = 'envelope-card' + (openedSet.has(i) ? ' opened' : '');
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `Letter ${i + 1} from ${letter.sender}`);

      const voiceBadge = letter.audio
        ? `<div class="env-voice-badge">🎙 Voice</div>`
        : '';

      card.innerHTML = `
        <div class="envelope-wrap">
          ${voiceBadge}
          <div class="env-opened-badge">✓</div>
          <div class="envelope-inner">
            <div class="env-seal">${sealEmojis[i]}</div>
            <span class="env-number">Letter ${i + 1}</span>
          </div>
        </div>
      `;

      card.addEventListener('click', () => openLetter(i));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLetter(i); });
      grid.appendChild(card);
    });

    updateProgress();

    /* ============================================================
       MODAL LOGIC
    ============================================================ */
    const overlay  = document.getElementById('modal-overlay');
    const closeBtn = document.getElementById('modal-close');
    const bodyEl   = document.getElementById('modal-body');
    const audioWrap = document.getElementById('modal-audio-wrap');
    const audioPlayer = document.getElementById('modal-audio-player');

    function openLetter(index) {
      const letter = letters[index];
      document.getElementById('modal-letter-num').textContent = `Letter ${index + 1} of 16`;
      document.getElementById('modal-sender').textContent = letter.sender;

      if (letter.audio) {
        // Voice message mode — pause bg music so they don't overlap
        if (musicOn) bgMusic.pause();
        bodyEl.style.display = 'none';
        audioWrap.style.display = 'flex';
        audioPlayer.src = letter.audio;
        audioPlayer.load();
      } else {
        // Text letter mode
        bodyEl.style.display = '';
        audioWrap.style.display = 'none';
        bodyEl.textContent = letter.message;
        // Stop any previously playing voice message
        audioPlayer.pause();
        audioPlayer.src = '';
      }

      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      openedSet.add(index);
      localStorage.setItem('rose_opened', JSON.stringify([...openedSet]));
      document.querySelectorAll('.envelope-card')[index].classList.add('opened');
      updateProgress();
    }

    function closeLetter() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      // Stop the voice player
      audioPlayer.pause();
      audioPlayer.src = '';
      // Resume bg music if it was playing before the voice modal opened
      if (musicOn) {
        bgMusic.play().catch(() => {});
      }
    }

    closeBtn.addEventListener('click', closeLetter);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeLetter(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLetter(); });

    /* ============================================================
       PROGRESS
    ============================================================ */
    function updateProgress() {
      const count = openedSet.size;
      document.getElementById('opened-count').textContent = count;

    /* ============================================================
       BACKGROUND MUSIC — manual toggle button
       The button gives full control; autoplay also kicks in on the
       first interaction OUTSIDE the modal, so the voice message
       never accidentally triggers the background music.
    ============================================================ */
    const bgMusic    = document.getElementById('bg-music');
    const musicBtn   = document.getElementById('music-btn');
    const musicLabel = document.getElementById('music-label');
    let musicOn = false;
    let bgMusicUnlocked = false;

    // Manual toggle button
    musicBtn.addEventListener('click', () => {
      musicOn = !musicOn;
      if (musicOn) {
        bgMusicUnlocked = true;
        bgMusic.volume = 0.7;
        bgMusic.play().catch(() => {});
        musicLabel.textContent = 'Music On';
        musicBtn.querySelector('.note').textContent = '♫';
      } else {
        bgMusic.pause();
        musicLabel.textContent = 'Music Off';
        musicBtn.querySelector('.note').textContent = '♪';
      }
    });

    // Autoplay on first interaction outside the modal/audio player
    function tryAutoplay(e) {
      if (bgMusicUnlocked) return;
      // Skip if the interaction is inside the modal or audio player
      if (e && e.target && e.target.closest('#modal-overlay, #modal-audio-player, #modal-audio-wrap, #music-btn')) return;
      bgMusicUnlocked = true;
      musicOn = true;
      bgMusic.volume = 0.7;
      bgMusic.play().catch(() => {});
      musicLabel.textContent = 'Music On';
      musicBtn.querySelector('.note').textContent = '♫';
      document.removeEventListener('click',      tryAutoplay);
      document.removeEventListener('touchstart', tryAutoplay);
      document.removeEventListener('keydown',    tryAutoplay);
    }

    document.addEventListener('click',      tryAutoplay);
    document.addEventListener('touchstart', tryAutoplay);
    document.addEventListener('keydown',    tryAutoplay);

    /* ============================================================
       FLOATING LILY PETALS & SPARKLES (Canvas)
    ============================================================ */
    const canvas = document.getElementById('petal-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawLilyPetal(ctx, x, y, size, rotation, alpha, color) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.bezierCurveTo(size * 0.6, -size * 0.5, size * 0.6, size * 0.5, 0, size);
      ctx.bezierCurveTo(-size * 0.6, size * 0.5, -size * 0.6, -size * 0.5, 0, -size);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }

    function drawSparkle(ctx, x, y, size, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      ctx.fillStyle = '#C89A82';
      for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(size * 0.3, size * 0.3);
        ctx.lineTo(0, size);
        ctx.lineTo(-size * 0.3, size * 0.3);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    const petalColors = [
      'rgba(232,215,252,0.65)', 'rgba(242,206,222,0.65)',
      'rgba(248,220,240,0.6)',  'rgba(220,200,240,0.6)',
      'rgba(201,184,232,0.5)',
    ];

    const particles = [];
    for (let i = 0; i < 28; i++) {
      particles.push({
        type: 'petal',
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight * 1.5 - window.innerHeight * 0.5,
        size: 6 + Math.random() * 12,
        speedY: 0.3 + Math.random() * 0.6,
        speedX: (Math.random() - 0.5) * 0.4,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.02,
        alpha: 0.3 + Math.random() * 0.55,
        color: petalColors[Math.floor(Math.random() * petalColors.length)],
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.01 + Math.random() * 0.015,
      });
    }
    for (let i = 0; i < 14; i++) {
      particles.push({
        type: 'sparkle',
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: 3 + Math.random() * 5,
        speedY: 0.15 + Math.random() * 0.3,
        speedX: (Math.random() - 0.5) * 0.2,
        alpha: 0, alphaDir: 1,
        alphaSpeed: 0.006 + Math.random() * 0.008,
        maxAlpha: 0.25 + Math.random() * 0.35,
      });
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        if (p.type === 'petal') {
          p.wobble += p.wobbleSpeed;
          p.x += p.speedX + Math.sin(p.wobble) * 0.4;
          p.y += p.speedY;
          p.rot += p.rotSpeed;
          if (p.y > canvas.height + 30) { p.y = -30; p.x = Math.random() * canvas.width; }
          drawLilyPetal(ctx, p.x, p.y, p.size, p.rot, p.alpha, p.color);
        } else {
          p.alpha += p.alphaDir * p.alphaSpeed;
          if (p.alpha >= p.maxAlpha) { p.alpha = p.maxAlpha; p.alphaDir = -1; }
          if (p.alpha <= 0) { p.alpha = 0; p.alphaDir = 1; p.x = Math.random() * canvas.width; p.y = Math.random() * canvas.height; }
          p.y += p.speedY; p.x += p.speedX;
          if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
          drawSparkle(ctx, p.x, p.y, p.size, p.alpha);
        }
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    /* ============================================================
       INTERSECTION OBSERVER — staggered card entrance
    ============================================================ */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.style.animationPlayState = 'running';
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.envelope-card').forEach(card => {
      card.style.animationPlayState = 'paused';
      observer.observe(card);
    });
  </script>
